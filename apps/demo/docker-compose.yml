version: '3.8'

services:
  # ─── PostgreSQL (SQL Master) ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: omnidb-postgres
    environment:
      POSTGRES_USER: omnidb
      POSTGRES_PASSWORD: omnidb
      POSTGRES_DB: omnidb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnidb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MongoDB (NoSQL Document) ────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: omnidb-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis (Ephemeral Cache) ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: omnidb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
